
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Siddhi Kabel Corporation Pvt Ltd</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%234f46e5'/><text y='.9em' font-size='68' x='50%' text-anchor='middle' font-family='Arial,sans-serif' font-weight='bold' fill='white'>S</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <!-- Supabase UMD Script for stability -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    /* Mobile App Feel */
    body {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none; /* Disables pull-to-refresh effect on mobile */
    }
    /* Allow selection in inputs */
    input, textarea, select {
      -webkit-user-select: text;
      user-select: text;
    }

    /* Running Footer Screen Preview Styles */
    .running-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #e2e8f0;
      padding-top: 10px;
      margin-top: 20px;
      box-sizing: border-box;
      width: 100%;
    }
    .page-number::after {
      content: "Page 1";
    }

    @media print {
      body * {
        visibility: hidden !important;
      }
      .no-print, .no-print * {
        display: none !important;
      }
      #print-area, #print-area * {
        visibility: visible !important;
      }
      #print-area {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        height: auto !important;
        font-size: 8pt !important;
        color: black !important;
      }
      html, body, #root, #root > div, .bg-slate-100 {
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
      }
      @page {
        size: A4;
        margin: 10mm 10mm 20mm 10mm; /* Larger bottom margin for the fixed running footer */
      }
      body {
        margin: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      thead {
        display: table-header-group !important;
      }
      tr, .print-no-break {
        page-break-inside: avoid !important;
      }
      .print-wrapper {
        display: flex;
        flex-direction: column;
        min-height: 265mm; /* Set close to printable A4 height (297mm - 10mm top - 20mm bottom) */
        border: 1px solid #94a3b8; /* Elegant slate border */
        padding: 18px !important;
        box-sizing: border-box;
        border-radius: 6px;
        background: #ffffff;
      }
      .print-main-content {
        flex-grow: 1;
      }
      .running-footer {
        position: fixed;
        bottom: -15mm; /* Positions footer cleanly inside the 20mm bottom margin */
        left: 0;
        right: 0;
        height: 12mm;
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid #cbd5e1;
        padding-top: 6px;
        box-sizing: border-box;
      }
      .page-number::after {
        content: "Page " counter(page) !important;
      }
      #print-area h1 {
        font-size: 14pt !important;
        margin-bottom: 2px !important;
        white-space: nowrap !important;
        overflow: hidden;
      }
      #print-area h2 {
        font-size: 11pt !important;
        margin-top: 6px !important;
        margin-bottom: 6px !important;
      }
      #print-area p,
      #print-area ol {
        line-height: 1.35 !important;
      }
      #print-area table {
        font-size: 7.5pt !important;
        border-collapse: collapse !important;
        width: 100% !important;
      }
      #print-area th {
        background-color: #0f172a !important; /* Dark Slate Header */
        color: #ffffff !important;
        font-weight: 700 !important;
        padding: 5px 6px !important;
        border: 1px solid #cbd5e1 !important;
      }
      #print-area td {
        padding: 4px 6px !important;
        border: 1px solid #e2e8f0 !important;
      }
      #print-area .signature-space {
        height: 35px !important;
      }
    }
  </style>
</head>
  <body class="bg-slate-100">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
